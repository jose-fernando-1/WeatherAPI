<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="card hero">
        <h1>Weather Dashboard</h1>
        <p>Search for a city to see current weather and 7-day forecast.</p>

        <form id="weather-form" class="search-form" autocomplete="off">
          <label for="city">City</label>
          <div class="search-row">
            <input id="city" name="city" type="text" placeholder="e.g. Sao Paulo" required />
            <button type="submit">Search</button>
          </div>
        </form>
      </section>

      <section id="status" class="status" aria-live="polite"></section>

      <section id="current-card" class="card hidden">
        <h2 id="current-title">Current Conditions</h2>
        <div class="metrics" id="current-metrics"></div>
      </section>

      <section id="forecast-card" class="card hidden">
        <h2>Next 7 Days</h2>
        <div id="forecast-list" class="forecast-list"></div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
